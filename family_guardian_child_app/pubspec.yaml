name: family_guardian_child_app
description: "Family Guardian - Child App. Transparent parental-supervision companion app that syncs location, device status, and screen-time with the family's Lovable Cloud dashboard."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1

  # Local secure-ish storage for the device token & cached profile
  shared_preferences: ^2.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Location
  location: ^6.0.2
  google_maps_flutter: ^2.7.0

  # Device status
  battery_plus: ^6.0.2
  connectivity_plus: ^6.0.5
  
  # Advanced Data Tracking
  call_log: ^4.0.0
  device_apps: ^2.2.0
  sms_advanced: ^1.0.1

  # App usage / screen time (Android only — see README for iOS notes)
  usage_stats: ^1.3.0

  # Background execution
  flutter_background_service: ^5.0.10

  # Charts for the Reports tab
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
